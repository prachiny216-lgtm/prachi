<!DOCTYPE html>\n<html lang=\\"en\\">\n<head>\n    <meta charset=\\"UTF-8\\">\n    <meta name=\\"viewport\\" content=\\"width=device-width, initial-scale=1.0\\">\n    <title>Digital Clock</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background: linear-gradient(135deg, #f0f9ff, #cbebff);\n            font-family: Arial, sans-serif;\n        }\n        .clock {\n            text-align: center;\n            color: #333;\n            font-size: 2.5em;\n            padding: 20px;\n            border: 2px solid #333;\n            border-radius: 10px;\n            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);\n    }\n    </style>\n</head>\n<body>\n    <div class=\\"clock\\">\n        <div id=\\"utc\\">UTC: --:--:--</div>\n        <div id=\\"ist\\">IST: --:--:--</div>\n        <div id=\\"est\\">EST: --:--:--</div>\n        <div id=\\"pst\\">PST: --:--:--</div>\n        <div id=\\"gmt\\">GMT: --:--:--</div>\n        <div id=\\"jst\\">JST: --:--:--</div>\n    </div>\n    <script>\n        function updateClocks() {\n            const now = new Date();\n            const options = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };\n            document.getElementById('utc').textContent = 'UTC: ' + now.toUTCString().slice(17, 25);\n            document.getElementById('ist').textContent = 'IST: ' + new Intl.DateTimeFormat('en-IN', options).format(now);\n            document.getElementById('est').textContent = 'EST: ' + new Intl.DateTimeFormat('en-US', options).format(new Date(now.getTime() - 5 * 60 * 60 * 1000));\n            document.getElementById('pst').textContent = 'PST: ' + new Intl.DateTimeFormat('en-US', options).format(new Date(now.getTime() - 8 * 60 * 60 * 1000));\n            document.getElementById('gmt').textContent = 'GMT: ' + new Intl.DateTimeFormat('en-GB', options).format(now);\n            document.getElementById('jst').textContent = 'JST: ' + new Intl.DateTimeFormat('ja-JP', options).format(new Date(now.getTime() + 9 * 60 * 60 * 1000));\n        }\n        setInterval(updateClocks, 1000);\n        updateClocks();\n    </script>\n</body>\n</html>
